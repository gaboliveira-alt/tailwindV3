<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="./output.css">
</head>
<body>
    <div class="flex items-center justify-center gap-4 h-screen">
        <div class="w-56 bg-sky-500 text-white rounded-md p-4">
            Smartphones (Até 640px)
        </div>
        <div class="w-56 bg-yellow-500 text-white rounded-md p-4 hidden md:block">
            Tablets (Até 768px)
        </div>
        <div class="w-56 bg-orange-500 text-white rounded-md p-4 hidden lg:block">
            Desktops (Até 1024px)
        </div>
        <div class="w-96 bg-red-500 text-white rounded-md p-4 hidden xl:block">
            Monitores de Desktops grandes (Até 1280px)
        </div>
        <div class="w-[468px] bg-indigo-500 text-white rounded-md p-4 hidden 2xl:block">
            Monitores de Desktops extra grandes ou TVs (Até 1536px)
        </div>
    </div>
</body>
</html>
