<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="./output.css">
</head>
<body class="bg-slate-50 dark:bg-slate-950">
    <div class="rounded-lg p-6 border-2 border-indigo-600 max-w-96 mx-auto mt-6">
        <h3 class="text-slate-900 dark:text-white text-lg font-semibold">
            Card Title
        </h3>

        <p class="text-slate-500 dark:text-slate-300 mt-2 text-sm">
            Lorem ipsum dolor sit amet consectetur adipisicing elit. Praesentium earum magnam provident neque iste nisi aliquam maiores est, sed explicabo consequatur voluptatum asperiores aperiam distinctio reprehenderit nesciunt ad, quidem necessitatibus?
        </p>

        <button class="bg-indigo-600 text-white py-1 px-6 rounded-md mt-4 mx-auto active:scale-90" onclick="changeTheme()">
            Alterar o tema!
        </button>
    </div>

    <script>
        const changeTheme = () => {
            if (document.documentElement.classList.contains('dark')) {
                theme = 'light'
            }
            else {
                theme = 'dark'
            }

            document.documentElement.classList.toggle('dark', theme === 'dark')
            document.documentElement.classList.toggle('light', theme === 'light')
        }
    </script>
</body>
</html>
